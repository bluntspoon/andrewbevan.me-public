function getCat(f) { return overrides[f] || AUTO_CATS[f] || 'outside'; }
function setCat(f, val) {
  if (val === AUTO_CATS[f]) delete overrides[f]; else overrides[f] = val;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
}

// filter state
let activeCat = 'all';

function applyFilters() {
  const showAll = activeCat === 'all';
  document.querySelectorAll('.hg-section-block').forEach(block => {
    const key = block.dataset.sec;
    if (!showAll && activeCat !== key) { block.style.display = 'none'; return; }
    let visible = 0;
    block.querySelectorAll('.hg-card').forEach(card => {
      const show = showAll || getCat(card.dataset.file) === key;
      card.classList.toggle('hg-hidden', !show);
      if (show) visible++;
    });
    block.style.display = visible > 0 ? '' : 'none';
    const ce = block.querySelector('.hg-section-count');
    if (ce) ce.textContent = visible + ' photo' + (visible === 1 ? '' : 's');
  });
}

document.querySelectorAll('.hg-btn[data-cat]').forEach(btn =>
  btn.addEventListener('click', () => {
    document.querySelectorAll('.hg-btn[data-cat]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    applyFilters();
  })
);

// lightbox
let lbIndex = 0, lbFiles = [];
function buildLbFiles() {
  lbFiles = [];
  document.querySelectorAll('.hg-card:not(.hg-hidden)').forEach(c => lbFiles.push(c.dataset.file));
}
function hgOpenLb(file) {
  buildLbFiles();
  lbIndex = lbFiles.indexOf(file);
  if (lbIndex < 0) lbIndex = 0;
  hgShowLb();
}
function hgShowLb() {
  const f = lbFiles[lbIndex];
  if (!f) return;
  document.getElementById('hg-lb-img').src = IMG_BASE + f;
  document.getElementById('hg-lb-label').textContent = f + '  (' + (lbIndex + 1) + '/' + lbFiles.length + ')';
  document.getElementById('hg-lb').classList.add('hg-open');
}
window.hgCloseLb = function() { document.getElementById('hg-lb').classList.remove('hg-open'); };
window.hgMove = function(d) { lbIndex = (lbIndex + d + lbFiles.length) % lbFiles.length; hgShowLb(); };

document.addEventListener('keydown', e => {
  if (!document.getElementById('hg-lb').classList.contains('hg-open')) return;
  if (e.key === 'ArrowRight') hgMove(1);
  if (e.key === 'ArrowLeft')  hgMove(-1);
  if (e.key === 'Escape')     hgCloseLb();
});
document.getElementById('hg-lb').addEventListener('click', e => {
  if (e.target.id === 'hg-lb') hgCloseLb();
});
// touch swipe
let _tx = null;
document.getElementById('hg-lb').addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive: true });
document.getElementById('hg-lb').addEventListener('touchend',   e => {
  if (_tx === null) return;
  const dx = e.changedTouches[0].clientX - _tx; _tx = null;
  if (Math.abs(dx) > 40) hgMove(dx < 0 ? 1 : -1);
}, { passive: true });

// build DOM
function makeCard(f) {
  const cat = getCat(f);
  const card = document.createElement('div');
  card.className = 'hg-card';
  card.dataset.file = f;

  const img = document.createElement('img');
  img.src = IMG_BASE + f;
  img.loading = 'lazy';
  img.alt = f;
  img.title = f.startsWith('hq-') ? 'Prop24 HQ' : 'Private Property';
  img.addEventListener('click', () => hgOpenLb(f));
  card.appendChild(img);

  const footer = document.createElement('div');
  footer.className = 'hg-card-footer';

  const name = document.createElement('span');
  name.className = 'hg-card-name';
  name.title = f;
  name.textContent = f.replace('hq-','').replace(/^0+/,'').replace(/_\d+\.jpg$/,'').replace('.jpg','');
  footer.appendChild(name);

  const sel = document.createElement('select');
  sel.className = 'hg-cat-sel hg-cat-' + cat;
  [['outside','🌿'],['house','🏠'],['cottage','🏡']].forEach(([v, lbl]) => {
    const o = document.createElement('option');
    o.value = v; o.textContent = lbl; o.selected = v === cat;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => {
    setCat(f, sel.value);
    sel.className = 'hg-cat-sel hg-cat-' + sel.value;
    const targetGrid = document.querySelector('.hg-section-block[data-sec="' + sel.value + '"] .hg-grid');
    if (targetGrid) targetGrid.appendChild(card);
    applyFilters();
  });
  footer.appendChild(sel);
  card.appendChild(footer);
  return card;
}

const sectionsEl = document.getElementById('hg-sections');
const sectionGrids = {};

SECTIONS.forEach(sec => {
  const block = document.createElement('div');
  block.className = 'hg-section-block';
  block.dataset.sec = sec.key;

  const h = document.createElement('div');
  h.className = 'hg-section-heading ' + sec.cls;
  h.innerHTML = '<span>' + sec.icon + ' ' + sec.label + '</span><span class="hg-section-count">—</span>';
  block.appendChild(h);

  const d = document.createElement('div');
  d.className = 'hg-section-divider';
  block.appendChild(d);

  const g = document.createElement('div');
  g.className = 'hg-grid';
  block.appendChild(g);

  sectionGrids[sec.key] = g;
  sectionsEl.appendChild(block);
});

ALL_FILES.forEach(f => {
  const cat = getCat(f);
  const key = SECTIONS.find(s => s.key === cat) ? cat : 'outside';
  sectionGrids[key].appendChild(makeCard(f));
});

applyFilters();
})();
</script>
